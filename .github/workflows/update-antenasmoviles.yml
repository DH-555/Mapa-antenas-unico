name: Actualizar AntenasMoviles

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-antenasmoviles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependencias
        working-directory: client
        run: bun install

      - name: Actualizar datos desde AntenasMoviles
        working-directory: client
        run: bun run generate:antenasmoviles

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add client/public/data/antenasMoviles.json client/public/data/history.json

          if git diff --cached --quiet; then
            echo "Sin cambios para commit"
            exit 0
          fi

          git commit -m "chore(data): actualizar AntenasMoviles"
          git push
