name: Actualización automática de antenas

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependencias
        working-directory: client
        run: npm ci

      - name: Descargar datos de AntenasMoviles
        working-directory: client
        run: npm run generate:antenasmoviles

      - name: Confirmar y publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/antenasMoviles.json client/public/data/history.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos de antenas."
          else
            git commit -m "chore: actualizar datos de antenas [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push || exit 1
          fi
